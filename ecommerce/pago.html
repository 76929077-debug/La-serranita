<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulación de Pago - La Serranita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5" style="max-width: 600px;">
        <div class="card p-5 shadow border-0">
            <h2 class="text-center text-danger mb-4 fw-bold">Pago Seguro</h2>
            <p class="text-center text-muted">Estás por pagar un total de: <span id="monto-pagar" class="fs-4 fw-bold text-dark">S/. 0.00</span></p>
            
            <hr class="mb-4">

            <form id="form-pago">
                <div class="mb-3">
                    <label class="form-label">Nombre en la tarjeta</label>
                    <input type="text" class="form-control" required placeholder="Juan Pérez">
                </div>

                <div class="mb-3">
                    <label class="form-label">Número de tarjeta</label>
                    <input type="text" class="form-control" maxlength="16" required placeholder="4557 8812 3344 5566">
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Expiración</label>
                        <input type="text" class="form-control" placeholder="MM/AA" maxlength="5" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Código CVV</label>
                        <input type="password" class="form-control" placeholder="123" maxlength="3" required>
                    </div>
                </div>

                <button type="submit" id="btn-pagar" class="btn btn-danger btn-lg w-100 mt-4 fw-bold">
                    Procesar Pago Simulado
                </button>
            </form>

            <div id="alerta-exito" class="alert alert-success mt-4 text-center d-none" role="alert">
                <h4 class="alert-heading">¡Pago Exitoso! 🎉</h4>
                <p>Tu orden en La Serranita ha sido procesada. ¡Gracias por tu compra!</p>
                <a href="index2.html" class="btn btn-success mt-2">Volver al Inicio</a>
            </div>
        </div>
    </div>

    <script src="pago.js"></script>
</body>
</html>
